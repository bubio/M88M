name: Build FreeBSD (x86_64 pkg)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'assets/**'
      - 'src/**'
      - 'scripts/build_freebsd_pkg.sh'
      - '.github/workflows/build-freebsd.yml'
      - '.github/workflows/publish-release-assets.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'assets/**'
      - 'src/**'
      - 'scripts/build_freebsd_pkg.sh'
      - '.github/workflows/build-freebsd.yml'
      - '.github/workflows/publish-release-assets.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v7

    - name: Build pkg in FreeBSD VM
      uses: vmactions/freebsd-vm@v1
      with:
        release: "14.4"
        usesh: true
        sync: rsync
        prepare: |
          pkg install -y cmake git pkgconf ca_root_nss libiconv libX11 libXcursor libXinerama libXrandr libXi mesa-libs gtk3
        run: |
          sh scripts/build_freebsd_pkg.sh

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: m88m-freebsd-x64-pkg
        path: dist/*.pkg

  publish-release:
    if: github.event_name == 'release'
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/publish-release-assets.yml
    with:
      asset-patterns: |
        *.pkg
