name: Build Linux (x64/arm64 DEB/RPM/AppImage)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'assets/**'
      - 'src/**'
      - 'scripts/build_linux.sh'
      - '.github/workflows/build-linux.yml'
      - '.github/workflows/publish-release-assets.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'assets/**'
      - 'src/**'
      - 'scripts/build_linux.sh'
      - '.github/workflows/build-linux.yml'
      - '.github/workflows/publish-release-assets.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runs-on: ubuntu-24.04
            linuxdeploy-arch: x86_64
            deb-artifact: m88m-linux-x64-deb
            rpm-artifact: m88m-linux-x64-rpm
            appimage-artifact: m88m-linux-x64-appimage
          - arch: arm64
            runs-on: ubuntu-24.04-arm
            linuxdeploy-arch: aarch64
            deb-artifact: m88m-linux-arm64-deb
            rpm-artifact: m88m-linux-arm64-rpm
            appimage-artifact: m88m-linux-arm64-appimage

    runs-on: ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v7

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libasound2-dev \
          libx11-dev \
          libxcursor-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libgtk-3-dev \
          rpm \
          wget

    - name: Build
      run: chmod +x scripts/build_linux.sh && ./scripts/build_linux.sh

    - name: Package with CPack
      run: |
        cd build
        cpack -G "DEB;RPM"

    - name: Prepare Distribution
      run: |
        mkdir -p dist/deb dist/rpm dist/appimage
        cp build/*.deb dist/deb/
        cp build/*.rpm dist/rpm/

    - name: Build AppImage
      if: github.event_name == 'release'
      env:
        APPIMAGE_EXTRACT_AND_RUN: 1
      run: |
        cmake --install build --prefix build/AppDir/usr
        # AppIcon.png is a 1024x1024 master, but it is installed into the
        # hicolor 512x512 directory; resize it so linuxdeploy's resolution
        # check against the directory name passes.
        sudo apt-get install -y imagemagick
        convert build/AppDir/usr/share/icons/hicolor/512x512/apps/m88m.png \
          -resize 512x512 \
          build/AppDir/usr/share/icons/hicolor/512x512/apps/m88m.png
        # Name the AppImage m88m-<version>-linux-<arch>.AppImage. OUTPUT is
        # honoured by linuxdeploy-plugin-appimage, so the file is written
        # directly under that name (avoiding a glob collision with the
        # downloaded linuxdeploy-*.AppImage).
        VERSION="$(sed -n 's/^[[:space:]]*VERSION[[:space:]]*\([0-9][0-9.]*\).*/\1/p' CMakeLists.txt | head -n 1)"
        export OUTPUT="m88m-${VERSION}-linux-${{ matrix.linuxdeploy-arch }}.AppImage"
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.linuxdeploy-arch }}.AppImage
        chmod +x linuxdeploy-${{ matrix.linuxdeploy-arch }}.AppImage
        ./linuxdeploy-${{ matrix.linuxdeploy-arch }}.AppImage \
          --appdir=build/AppDir \
          -d build/AppDir/usr/share/applications/m88m.desktop \
          -i build/AppDir/usr/share/icons/hicolor/512x512/apps/m88m.png \
          -o appimage
        mv "$OUTPUT" dist/appimage/

    - name: Upload DEB Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.deb-artifact }}
        path: dist/deb/

    - name: Upload RPM Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.rpm-artifact }}
        path: dist/rpm/

    - name: Upload AppImage Artifact
      if: github.event_name == 'release'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.appimage-artifact }}
        path: dist/appimage/

  publish-release:
    if: github.event_name == 'release'
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/publish-release-assets.yml
    with:
      asset-patterns: |
        *.deb
        *.rpm
        *.AppImage
