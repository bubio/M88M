name: Build Linux (x86_64 DEB/RPM)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libasound2-dev \
          libx11-dev \
          libxcursor-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libgtk-3-dev \
          rpm

    - name: Build
      run: chmod +x scripts/build_linux.sh && ./scripts/build_linux.sh

    - name: Package with CPack
      run: |
        cd build
        cpack -G "DEB;RPM"

    - name: ZIP Packages
      run: |
        mkdir dist
        cp build/*.deb build/*.rpm dist/
        zip -j m88m-linux-packages.zip dist/*

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: m88m-linux-packages
        path: m88m-linux-packages.zip
