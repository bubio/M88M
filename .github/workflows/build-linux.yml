name: Build Linux (x86_64 DEB/RPM)

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v6

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libasound2-dev \
          libx11-dev \
          libxcursor-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libgtk-3-dev \
          rpm

    - name: Build
      run: chmod +x scripts/build_linux.sh && ./scripts/build_linux.sh

    - name: Package with CPack
      run: |
        cd build
        cpack -G "DEB;RPM"

    - name: Prepare Distribution
      run: |
        mkdir dist
        cp build/*.deb build/*.rpm dist/

    - name: Upload Artifact
      if: github.event_name != 'release'
      uses: actions/upload-artifact@v4
      with:
        name: m88m-linux-packages
        path: dist/

    - name: Upload Release Artifacts
      if: github.event_name == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: m88m-linux-packages
        path: dist/

    - name: Update Release (DEB)
      if: github.event_name == 'release'
      uses: svenstaro/upload-release-action@v2
      with:
        file: dist/*.deb
        file_glob: true
        overwrite: true

    - name: Update Release (RPM)
      if: github.event_name == 'release'
      uses: svenstaro/upload-release-action@v2
      with:
        file: dist/*.rpm
        file_glob: true
        overwrite: true
