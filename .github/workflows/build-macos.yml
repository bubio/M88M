name: Build macOS (Universal)

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v7

    - name: Set up Xcode 26.5
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "26.5"

    - name: Build
      env:
        MACOS_UNIVERSAL: 1
      run: chmod +x scripts/build_macos.sh && ./scripts/build_macos.sh

    - name: Upload .app Artifact
      if: github.event_name != 'release'
      uses: actions/upload-artifact@v7
      with:
        name: M88M-macos-app
        path: build/M88M.app

    - name: Package DMG (Release only)
      if: github.event_name == 'release'
      run: |
        cd build
        cpack -G DragNDrop -C Release
        mv [mM]88[mM]*.dmg M88M-macos-universal.dmg

    - name: Upload DMG Artifact
      if: github.event_name == 'release'
      uses: actions/upload-artifact@v7
      with:
        name: M88M-macos-universal.dmg
        path: build/M88M-macos-universal.dmg

    - name: Update Release
      if: github.event_name == 'release'
      uses: svenstaro/upload-release-action@v2
      with:
        file: build/M88M-macos-universal.dmg
        overwrite: true
