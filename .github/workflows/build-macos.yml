name: Build macOS (Universal)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'assets/**'
      - 'src/**'
      - 'scripts/build_macos.sh'
      - '.github/workflows/build-macos.yml'
      - '.github/workflows/publish-release-assets.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'assets/**'
      - 'src/**'
      - 'scripts/build_macos.sh'
      - '.github/workflows/build-macos.yml'
      - '.github/workflows/publish-release-assets.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v7

    - name: Set up Xcode 26.5
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "26.5"

    - name: Build
      env:
        MACOS_UNIVERSAL: 1
      run: chmod +x scripts/build_macos.sh && ./scripts/build_macos.sh

    - name: Package .app (zip)
      if: github.event_name != 'release'
      run: |
        ditto -c -k --sequesterRsrc --keepParent \
          build/M88M.app \
          build/m88m-macos-universal.zip

    - name: Upload .app Artifact
      if: github.event_name != 'release'
      uses: actions/upload-artifact@v7
      with:
        name: m88m-macos-universal
        path: build/m88m-macos-universal.zip
        if-no-files-found: error

    - name: Package DMG (Release only)
      if: github.event_name == 'release'
      run: |
        cd build
        cpack -G DragNDrop -C Release
        mv [mM]88[mM]*.dmg m88m-macos-universal.dmg

    - name: Upload DMG Artifact
      if: github.event_name == 'release'
      uses: actions/upload-artifact@v7
      with:
        name: m88m-macos-universal-dmg
        path: build/m88m-macos-universal.dmg

  publish-release:
    if: github.event_name == 'release'
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/publish-release-assets.yml
    with:
      asset-patterns: |
        *.dmg
