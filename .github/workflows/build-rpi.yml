name: Build Raspberry Pi (armhf)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'assets/**'
      - 'src/**'
      - '.github/workflows/build-rpi.yml'
      - '.github/workflows/publish-release-assets.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'assets/**'
      - 'src/**'
      - '.github/workflows/build-rpi.yml'
      - '.github/workflows/publish-release-assets.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v7

    - name: Switch apt sources to ports.ubuntu.com for armhf
      run: |
        FLAVOR="$(lsb_release -sc)"
        sudo tee /etc/apt/sources.list.d/armhf.list <<LIST
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR} main restricted
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR}-updates main restricted
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR} universe
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR}-updates universe
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR} multiverse
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR}-updates multiverse
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR}-backports main restricted universe multiverse
        LIST
        sudo sed -E -i 's/deb (http|file|mirror)/deb [arch=amd64,i386] \1/' /etc/apt/sources.list

    - name: Install Cross-Compile Tools and Dependencies
      run: |
        sudo dpkg --add-architecture armhf
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          pkg-config \
          g++-arm-linux-gnueabihf \
          libasound2-dev:armhf \
          libx11-dev:armhf \
          libxcursor-dev:armhf \
          libxinerama-dev:armhf \
          libxrandr-dev:armhf \
          libxi-dev:armhf \
          libgl1-mesa-dev:armhf \
          libgtk-3-dev:armhf \
          x11proto-dev:armhf

    - name: Build
      run: |
        export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
        export PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=armv7l \
          -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
          -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
          -DCPACK_GENERATOR=DEB \
          -DCPACK_DEBIAN_PACKAGE_ARCHITECTURE=armhf
        cmake --build build -j "$(nproc)"

    - name: Package with CPack
      run: |
        cd build
        cpack -G DEB

    - name: Prepare Distribution
      run: |
        mkdir dist
        cp build/*.deb dist/

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: m88m-linux-armhf-deb
        path: dist/

  publish-release:
    if: github.event_name == 'release'
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/publish-release-assets.yml
    with:
      asset-patterns: |
        *.deb
