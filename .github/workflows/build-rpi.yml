name: Build Raspberry Pi OS (armhf/arm64)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'assets/**'
      - 'src/**'
      - '.github/workflows/build-rpi.yml'
      - '.github/workflows/publish-release-assets.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'assets/**'
      - 'src/**'
      - '.github/workflows/build-rpi.yml'
      - '.github/workflows/publish-release-assets.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # 32-bit Raspberry Pi OS: cross-compiled on an x86 host (no armhf
          # runner exists). Targets ARMv7-A + NEON (Pi 2 / Zero 2 W and later).
          - arch: armhf
            runs-on: ubuntu-22.04
          # 64-bit Raspberry Pi OS: built natively on the arm64 runner.
          # Ubuntu 22.04's glibc is close to Raspberry Pi OS (Debian bookworm),
          # so the binary stays compatible; a newer runner would link against a
          # glibc too recent for Pi OS.
          - arch: arm64
            runs-on: ubuntu-22.04-arm

    runs-on: ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v7

    # --- armhf: cross-compile on x86 host --------------------------------
    - name: Switch apt sources to ports.ubuntu.com for armhf
      if: matrix.arch == 'armhf'
      run: |
        FLAVOR="$(lsb_release -sc)"
        sudo tee /etc/apt/sources.list.d/armhf.list <<LIST
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR} main restricted
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR}-updates main restricted
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR} universe
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR}-updates universe
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR} multiverse
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR}-updates multiverse
        deb [arch=armhf] http://ports.ubuntu.com/ ${FLAVOR}-backports main restricted universe multiverse
        LIST
        sudo sed -E -i 's/deb (http|file|mirror)/deb [arch=amd64,i386] \1/' /etc/apt/sources.list

    - name: Install cross-compile tools and dependencies (armhf)
      if: matrix.arch == 'armhf'
      run: |
        sudo dpkg --add-architecture armhf
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          pkg-config \
          g++-arm-linux-gnueabihf \
          libasound2-dev:armhf \
          libx11-dev:armhf \
          libxcursor-dev:armhf \
          libxinerama-dev:armhf \
          libxrandr-dev:armhf \
          libxi-dev:armhf \
          libgl1-mesa-dev:armhf \
          libegl1-mesa-dev:armhf \
          libgles2-mesa-dev:armhf \
          libgtk-3-dev:armhf \
          x11proto-dev:armhf

    - name: Configure and build (armhf)
      if: matrix.arch == 'armhf'
      run: |
        export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
        export PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig
        # Target ARMv7-A with NEON so the audio resampler/mixer float loops
        # vectorize. This drops support for ARMv6 boards (Pi 1 / original Pi
        # Zero) but greatly speeds up audio on Pi 2 / Zero 2 W and later,
        # avoiding real-time audio dropouts. -ffast-math lets GCC vectorize the
        # FIR's float accumulation.
        ARM_FLAGS="-march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard -ffast-math"
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DM88M_RASPIOS=ON \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=armv7l \
          -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
          -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
          -DCMAKE_C_FLAGS="$ARM_FLAGS" \
          -DCMAKE_CXX_FLAGS="$ARM_FLAGS" \
          -DCPACK_GENERATOR=DEB \
          -DCPACK_DEBIAN_PACKAGE_ARCHITECTURE=armhf
        cmake --build build -j "$(nproc)"

    # --- arm64: native build on the arm64 runner -------------------------
    - name: Install dependencies (arm64)
      if: matrix.arch == 'arm64'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          libasound2-dev \
          libx11-dev \
          libxcursor-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libegl1-mesa-dev \
          libgles2-mesa-dev \
          libgtk-3-dev

    - name: Configure and build (arm64)
      if: matrix.arch == 'arm64'
      run: |
        # M88M_RASPIOS forces GLES 2.0 (the Pi's Mesa V3D driver tops out at
        # desktop GL 3.1, so a GL 3.3 context fails even on 64-bit Pi OS) and
        # names the package m88m-<version>-raspios-arm64.deb.
        # NEON is mandatory on ARMv8-A, so no -mfpu flag is needed; -ffast-math
        # is still required to let GCC vectorize the FIR's float accumulation
        # (matching the armhf build's audio performance).
        ARM64_FLAGS="-ffast-math"
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DM88M_RASPIOS=ON \
          -DCMAKE_C_FLAGS="$ARM64_FLAGS" \
          -DCMAKE_CXX_FLAGS="$ARM64_FLAGS" \
          -DCPACK_GENERATOR=DEB \
          -DCPACK_DEBIAN_PACKAGE_ARCHITECTURE=arm64
        cmake --build build -j "$(nproc)"

    # --- shared ----------------------------------------------------------
    - name: Package with CPack
      run: |
        cd build
        cpack -G DEB

    - name: Prepare Distribution
      run: |
        mkdir dist
        cp build/*.deb dist/

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: m88m-raspios-${{ matrix.arch }}-deb
        path: dist/

  publish-release:
    if: github.event_name == 'release'
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/publish-release-assets.yml
    with:
      asset-patterns: |
        *.deb
