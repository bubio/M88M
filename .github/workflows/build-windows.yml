name: Build Windows (x86_64)

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025

    steps:
    - uses: actions/checkout@v4

    - name: Install ImageMagick
      run: |
        # Already installed on windows-latest, but ensuring just in case or using magick directly
        magick --version

    - name: Generate Icon
      run: |
        magick assets/AppIcon.png -define icon:auto-resize=256,128,64,48,32,16 assets/AppIcon.ico

    - name: Build
      run: ./scripts/build_win.ps1

    - name: Prepare Artifact
      run: |
        mkdir package
        copy build\RelWithDebInfo\m88m.exe package\

    - name: Upload Artifact
      if: github.event_name != 'release'
      uses: actions/upload-artifact@v4
      with:
        name: m88m-windows
        path: package/

    - name: Compress for Release
      if: github.event_name == 'release'
      run: powershell Compress-Archive -Path package\* -DestinationPath build\m88m-windows.zip

    - name: Upload Release Artifact
      if: github.event_name == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: m88m-windows.zip
        path: build/m88m-windows.zip

    - name: Update Release
      if: github.event_name == 'release'
      uses: svenstaro/upload-release-action@v2
      with:
        file: build/m88m-windows.zip
        overwrite: true
