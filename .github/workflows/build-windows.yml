name: Build Windows (x64/x86/arm64)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'assets/**'
      - 'src/**'
      - 'scripts/build_win.ps1'
      - '.github/workflows/build-windows.yml'
      - '.github/workflows/publish-release-assets.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'assets/**'
      - 'src/**'
      - 'scripts/build_win.ps1'
      - '.github/workflows/build-windows.yml'
      - '.github/workflows/publish-release-assets.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
            artifact: m88m-windows-x64-app
            package: m88m-windows-x64
          - arch: x86
            cmake_arch: Win32
            artifact: m88m-windows-x86-app
            package: m88m-windows-x86
          - arch: arm64
            cmake_arch: ARM64
            artifact: m88m-windows-arm64-app
            package: m88m-windows-arm64

    steps:
    - uses: actions/checkout@v7

    - name: Install ImageMagick
      run: |
        # Already installed on windows-latest, but ensuring just in case or using magick directly
        magick --version

    - name: Generate Icon
      run: |
        magick assets/AppIcon.png -define icon:auto-resize=256,128,64,48,32,16 assets/AppIcon.ico

    - name: Build
      run: ./scripts/build_win.ps1 -Architecture ${{ matrix.cmake_arch }}

    - name: Prepare Artifact
      run: |
        mkdir package
        copy build\RelWithDebInfo\m88m.exe package\

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact }}
        path: package/

  publish-release:
    if: github.event_name == 'release'
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/publish-release-assets.yml
    with:
      zip-artifacts: |
        m88m-windows-x64-app=m88m-windows-x64.zip
        m88m-windows-x86-app=m88m-windows-x86.zip
        m88m-windows-arm64-app=m88m-windows-arm64.zip
